server:
  port: 8082

spring:

  datasource:
    url: jdbc:mysql://localhost:3306/payment_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

  kafka:

    bootstrap-servers: localhost:9092

    consumer:
      group-id: payment-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

    producer:
      properties:
        spring.json.add.type.headers: false