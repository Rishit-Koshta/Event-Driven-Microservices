server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://localhost:8083
          predicates:
            - Path=/users/**

        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/orders/**

        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/inventory/**